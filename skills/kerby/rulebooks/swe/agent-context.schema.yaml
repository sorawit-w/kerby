$schema: "http://json-schema.org/draft-07/schema#"
$title: "AI Project Context Schema"
type: object

$defs:
  GuidelineLink:
    type: object
    properties:
      file: { type: string }
      version: { type: string }
      checksum: { type: string }
    required: [file]
    additionalProperties: false

  Runtime:
    type: object
    properties:
      primary: { type: string }
      language: { type: string }
      target: { type: string }
      compatibility:
        type: object
        additionalProperties: true
      buildCommand: { type: string }
      outputDir: { type: string }
    required: [primary, language]
    additionalProperties: true

  SastTools:
    type: object
    description: "Project-owned pinned SAST toolchain for `kerby swe audit --sast` (opt-in; see references/sast-provisioning.md). kerby resolves these pins, never tracks them upstream."
    properties:
      enabled: { type: boolean }
      python: { type: string }            # pinned interpreter, e.g. "3.12.7"
      requirements: { type: string }      # committed hash-locked lockfile path (pip --require-hashes), outside the .kerby/sast cache
      semgrep:
        type: object
        properties:
          version: { type: string }
          ruleset: { type: string }       # pinned ruleset, e.g. "p/owasp-top-ten@<rev>"
        additionalProperties: true
      advisoryDb:
        type: object
        properties:
          snapshot: { type: string }
          date: { type: string }          # source for the coverage-banner freshness line
        additionalProperties: true
    additionalProperties: true

  Stack:
    type: object
    properties:
      frameworks: { type: object, additionalProperties: true }
      tools:
        type: object
        properties:
          sast: { $ref: "#/$defs/SastTools" }
        additionalProperties: true
      aiProviders:
        type: array
        items:
          type: object
          properties:
            name: { type: string }
            model: { type: string }
            enabled: { type: boolean }
          required: [name]
          additionalProperties: true
    additionalProperties: true

  AiSection:
    type: object
    properties:
      enabled: { type: boolean }
      usage:
        type: array
        items: { type: string }
      notes:
        type: array
        items: { type: string }
      memoryPolicy:
        type: object
        additionalProperties: true
      planThreshold: { type: integer, minimum: 1, maximum: 7 }   # capped at 7: a plan must exist for the fixed grade>=7 approval to review
    additionalProperties: true

  KnowledgeSection:
    type: object
    properties:
      enabled: { type: boolean }
    additionalProperties: true

  ContextSection:
    type: object
    properties:
      enabled: { type: boolean }
    additionalProperties: true

  Status:
    type: object
    properties:
      editableBy:
        type: array
        items: { type: string }
      changePolicy: { type: string }
      lastEditedBy: { type: string }
    additionalProperties: true

properties:
  version:
    type: string
  lastUpdated:
    type: string
  linkedGuidelines:
    $ref: "#/$defs/GuidelineLink"

  project:
    type: object
    properties:
      name: { type: string }
      description: { type: string }
      type: { type: string }
      visibility: { type: string }
    required: [name]
    additionalProperties: true

  runtime:
    $ref: "#/$defs/Runtime"

  stack:
    $ref: "#/$defs/Stack"

  entryPoints:
    type: array
    items: { type: string }

  directories:
    type: object
    additionalProperties: true

  ai:
    $ref: "#/$defs/AiSection"

  knowledge:
    $ref: "#/$defs/KnowledgeSection"

  context:
    $ref: "#/$defs/ContextSection"

  preferences:
    type: object
    additionalProperties: true

  status:
    $ref: "#/$defs/Status"

  agentNotes:
    type: object
    description: "Free-form area that AI agents may extend."
    additionalProperties: true

required:
  - project
  - runtime
  - stack

additionalProperties: false
