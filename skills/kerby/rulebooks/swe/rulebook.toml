# swe — the software-engineering rulebook, kerby's first domain rulebook.
# Named `code` through v8; renamed in v9.0.0. Auto-selected by [detect] markers
# among the builtins (v9.1; no longer a silent default — D17). Extends base
# (implicit-mandatory; listed for clarity).
# Self-contained (v7): every declared path resolves inside this folder —
# uniform confinement, no builtin exemption.
# Contract: docs/rulebook-contract.md (contract 2).
id = "swe"
version = "2.5.0"
contract = 2
accepts = ["git_change"]
extends = ["base"]
description = "Coding guardrails: clarity over cleverness, safety over speed, never leave the repo broken — nothing unproven passes the gate."

[gate]
block_on = ["block"]
hold_on = ["warn"]

[tooling]                     # domain facts core's tier ladder consumes (D14);
build = "{build_command}"     # resolved per-project (agent-context.yaml / manifests)
lint = "{lint_command}"
test = "{test_command}"

[detect]                      # builtin auto-selection markers (D17, v9.1). Root-relative
                              # globs; the loader matches these among BUILTINS only (D19).
                              # Two kinds, both ROOT-ANCHORED — that is the whole safety story.
                              #  (1) Build/package manifests. (SKILL.md's readiness-nudge reads this
                              #      marker list from the manifest — no restated copy to keep in sync.)
                              #  (2) scripts/*.py, scripts/*.sh — non-recursive code signals that
                              #      catch a manifest-less repo whose code lives in scripts/ (a
                              #      skill-authoring repo with tooling but no build manifest —
                              #      kerby's own repo — would otherwise let skill-authoring
                              #      single-match and silently drop swe; now it multi-matches → ask).
                              # Why root-anchored, never recursive (**/*.py, **/*.sh): kerby ships
                              # .py/.sh under a consuming project's .claude/skills/kerby/ install
                              # (and external rulebook clones under .kerby/rulebooks/), so a
                              # recursive code glob would false-match every repo that merely HAS
                              # kerby installed — the self-install trap that also pruned
                              # skill-authoring's install glob. scripts/*.py matches repo-root
                              # scripts/ ONLY; it cannot reach .claude/skills/kerby/rulebooks/swe/
                              # scripts/ or .kerby/rulebooks/*/scripts/. Safety comes from where the
                              # pattern is ROOTED, not from excluding install dirs: a recursive
                              # glob + a .claude/ denylist (option c) was rejected — the denylist
                              # grows (.claude/, .kerby/rulebooks/, node_modules/…) and is executed
                              # by an LLM following prose that will eventually skip the exclusion.
markers = ["package.json", "deno.json", "pyproject.toml", "go.mod", "Cargo.toml", "scripts/*.py", "scripts/*.sh"]

[identity]                    # how this rulebook presents itself (contract v2 optional
                              # table, E15). signature_phrases: distinctive root-body text
                              # the engine's `status` scans context for — scan-only, never
                              # echoed. Confirmations: rendered verbatim at load/reload for
                              # the install-resolved builtin only (an external rulebook —
                              # even one named `swe` — always gets the engine's generic
                              # template). Wording predates v6; kept byte-identical for
                              # parity with the frozen .eval/parity baselines.
signature_phrases = [
  "Prime Directive",
  "Clarity over cleverness. Safety over speed.",
  "implement → check → commit → log → repeat",
  "<prime_directive>",
  "<hard_rules>",
  "<reference_index>",
]
load_confirmation = "**kerby loaded.** BOOTSTRAP is in context for this session — I will follow its rules until the session ends or context is compacted. If rules seem to stop applying mid-session, invoke `kerby` with `args: reload`."
reload_confirmation = "**kerby reloaded.** BOOTSTRAP refreshed in context."

# --- prose: the operating rules and gate-bearing references, in place -------

[[check]]
id = "operating-rules"
kind = "prose"
body = "BOOTSTRAP.md"                     # the parity spine: eager, read in full at load
enforcement = "behavioral"
severity = "block"
token_cost = "medium"

[[check]]
id = "quality-gate-tiers"
kind = "prose"
body = "references/quality-gates.md"
enforcement = "behavioral"
severity = "block"
token_cost = "medium"

[[check]]
id = "verification-before-completion"
kind = "prose"
body = "references/validation.md"
enforcement = "behavioral"
severity = "block"
token_cost = "high"

[[check]]
id = "security-lens"
kind = "prose"
body = "references/validation.md"         # § Security Lens; loader dedups bodies by path.
enforcement = "behavioral"                # Findings carry basis=targeted, never "certified" (D16)
severity = "block"
token_cost = "high"

[[check]]
id = "guardrails-scope-security"
kind = "prose"
body = "references/guardrails.md"
enforcement = "behavioral"
severity = "block"
token_cost = "high"

[[check]]
id = "intent-gate-on-behavior-change"
kind = "prose"
body = "references/intent-gate.md"
enforcement = "behavioral"
severity = "block"
token_cost = "low"                        # eager — the forced artifact must be in context at the decision point

# --- code: the hook-backed checks (install remains the trust opt-in, D13) ---

[[check]]
id = "destructive-git"
kind = "code"
needs = ["branch"]
enforcement = "hard"
enforcer = "hooks/protect-git.sh"
event = "PreToolUse"
matcher = "Bash"
severity = "block"
floor = true                              # no escape hatch — data loss (guardrails.md)

[[check]]
id = "protected-branch-commit"
kind = "code"
needs = ["branch", "install_state"]
enforcement = "hard"
enforcer = "hooks/protect-git.sh"
event = "PreToolUse"
matcher = "Bash"
severity = "block"
override = "authorized-scoped"            # CODING_RULES_ALLOW_PROTECTED_COMMIT=1, user-authorized only

[[check]]
id = "protect-env"
kind = "code"
needs = ["changed_files"]
enforcement = "hard"
enforcer = "hooks/protect-env.sh"
event = "PreToolUse"
matcher = "Edit|Write"
severity = "block"

[[check]]
id = "env-read-warning"
kind = "code"
needs = ["changed_files"]
enforcement = "partial"
enforcer = "hooks/warn-env-read.sh"
event = "PreToolUse"
matcher = "Read"
gap = "Bash cat .env not caught; Read-tool only"
severity = "warn"

[[check]]
id = "high-stakes-routing"
kind = "code"
needs = ["changed_files"]
enforcement = "partial"
enforcer = "hooks/route-high-stakes.sh"
event = "PreToolUse"
matcher = "Edit|Write"
gap = "prose-only production-traffic-shaping category un-globbable"
severity = "warn"

[[check]]
id = "hollow-test-heuristic"
kind = "code"
needs = ["added_lines"]
enforcement = "partial"
enforcer = "hooks/hollow-test-check.sh"    # self-contained (v9.3): swe's own script, no secret scan, no exec into base's floor
event = "PreToolUse"
matcher = "Bash"
gap = "runtime fakes (0-match runs, gates over stubs) stay agent-judged"
severity = "warn"

# --- commands: user-invocable flows this rulebook provides (V2/V3) ----------

[[command]]
name = "audit"
body = "commands/audit.md"
description = "Static conformance audit of the project against the loaded corpus; writes a report under .kerby/audits/."

[[command]]
name = "prepare"
body = "commands/prepare.md"
description = "Onboard an existing repo: populate kerby's context artifacts from code and git history, diff-and-confirm on every write."
