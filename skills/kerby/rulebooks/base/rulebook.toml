# base — the universal floor every rulebook inherits (merge rule 1:
# always composed first, whether or not listed in `extends`).
# Contract: docs/rulebook-contract.md. floor = true checks are
# non-overridable by any config or extending rulebook (D9).
id = "base"
version = "1.1.0"
contract = 2
accepts = ["*"]
description = "The universal floor: secrets, untrusted-artifact, verification-claim, and irreversibility rules every rulebook inherits."

[gate]
block_on = ["block"]
hold_on = ["warn"]

[identity]                    # optional presentation table (contract v2, E15).
                              # signature_phrases: distinctive floor-rule text the engine's
                              # `status` scans context for (base loads under every selection,
                              # so these detect "some kerby corpus is loaded" even for a
                              # rulebook with no root body) — scan-only, never echoed.
                              # Exact substrings of the floor rule bodies; update together.
signature_phrases = [
  "The Iron Law of Completion Claims",
  "Never Print a Live Secret",
  "certainty is not authorization",
]

[[check]]
id = "secrets-staged"
kind = "data"
needs = ["staged_content"]
enforcement = "hard"
enforcer = "hooks/pre-commit-check.sh"   # self-contained: base owns the floor secret scan (V14)
event = "PreToolUse"
matcher = "Bash"
runner = "gitleaks"                       # betterleaks/gitleaks if present, else the built-in regex floor
severity = "block"
floor = true

[[check]]
id = "no-print-secret"
kind = "prose"
body = "rules/no-print-secret.md"
enforcement = "behavioral"                # a hook can't see chat output
severity = "block"
floor = true
token_cost = "low"

[[check]]
id = "untrusted-agent-artifacts"
kind = "prose"
body = "rules/untrusted-agent-artifacts.md"
enforcement = "behavioral"
severity = "block"
floor = true
token_cost = "medium"

[[check]]
id = "iron-law-claims"
kind = "prose"
body = "rules/iron-law-claims.md"
enforcement = "behavioral"
severity = "block"
floor = true
token_cost = "medium"

[[check]]
id = "approval-for-irreversible"
kind = "prose"
body = "rules/approval-for-irreversible.md"
enforcement = "behavioral"
severity = "block"
floor = true
token_cost = "low"
