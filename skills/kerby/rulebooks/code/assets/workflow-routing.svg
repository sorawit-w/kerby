<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Five task types map to five workflow files. Feature, refactor and tech debt converge on feature.md; docs, config and single-file edits go to quick-task.md. A high-stakes path override reroutes quick-task work to feature.md.</desc>
