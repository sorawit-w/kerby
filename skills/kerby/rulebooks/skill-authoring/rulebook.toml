# skill-authoring — the verification gate for the skill-authoring loop:
# build a skill (with any tool) -> verify with skill-evaluator before it ships.
# Governs the HOST repo's skills; kerby's own rule edits are governed by
# skills/kerby/CLAUDE.md, not this rulebook.
# Contract: docs/rulebook-contract.md (contract 2). Extends base (implicit).
id = "skill-authoring"
version = "1.1.0"
contract = 2
accepts = ["*"]
description = "Skill-authoring gate: no skill change ships as verified without a fresh skill-evaluator pass against the exact text being shipped."

[gate]
block_on = ["block"]
hold_on = ["warn"]

[detect]                      # builtin auto-selection markers (D17, v9.1). Root-relative
                              # globs matched among BUILTINS only (D19). Match a repo that
                              # AUTHORS agent skills — a root SKILL.md (single-skill repo) or
                              # skills/<name>/SKILL.md (a skills monorepo, kerby's own layout).
                              # Deliberately NOT `.claude/skills/*/SKILL.md`: that is the
                              # INSTALL location (kerby itself installs there project-locally),
                              # so it would false-match every repo that merely HAS kerby
                              # installed, not repos that author skills. A repo that both
                              # authors skills AND carries code — a build manifest OR a repo-root
                              # scripts/ dir of .py/.sh (so `swe` also matches) — is the expected
                              # multi-match (swe + skill-authoring); the loader asks, never
                              # guesses. kerby's own repo is this case: `skills/kerby/SKILL.md`
                              # matches here, its root `scripts/*.py|sh` matches swe. `swe`'s
                              # detect comment explains why those markers stay root-anchored.
                              # Only a skill repo with no manifest AND no root scripts/ dir
                              # matches skill-authoring alone.
markers = ["SKILL.md", "skills/*/SKILL.md"]

[[check]]
id = "evaluator-gate-on-final-text"
kind = "prose"
body = "rules/evaluator-gate.md"
enforcement = "behavioral"
severity = "block"
token_cost = "low"

[[check]]
id = "degrade-loudly-when-evaluator-missing"
kind = "prose"
body = "rules/degrade-loudly.md"
enforcement = "behavioral"
severity = "block"
token_cost = "low"

[[check]]
id = "classify-then-escalate"
kind = "prose"
body = "rules/classify-then-escalate.md"
enforcement = "behavioral"
severity = "warn"
token_cost = "low"  # eager-load: no index body references this, so a deferred cost would never load (all 4 bodies are short)

[[check]]
id = "record-evaluator-evidence"
kind = "prose"
body = "rules/record-the-verdict.md"
enforcement = "behavioral"
severity = "warn"
token_cost = "low"
